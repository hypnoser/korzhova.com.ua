<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* Забороняємо прокрутку самої сторінки */
    }
    .iframe-wrapper {
        width: 100%;
        height: 100%;
        overflow-y: auto; /* Дозволяємо прокрутку всередині контейнера */
        -webkit-overflow-scrolling: touch; /* Вмикає плавну сенсорну прокрутку на мобільних */
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }
</style>
</head>
<body>
    <div class="iframe-wrapper">
        <iframe 
            src="https://booking.easyweek.com.ua/kosmetoloh-estetyst-karyna-korzova" 
            style="border: 0; display: block; width: 100%; height: 100vh; touch-action: auto; pointer-events: auto;" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-top-navigation-by-user-activation"
            scrolling="yes">
        </iframe>
    </div>
</body>
</html>
